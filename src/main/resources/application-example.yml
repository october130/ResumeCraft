server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/resume_analyzer?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_database_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
      database: 3

# JWT配置
jwt:
  # 更换为你自己的随机密钥（Base64编码，至少32字节）
  secret: your_base64_encoded_secret_key_here
  # token有效期 24小时
  expiration: 86400000

mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
